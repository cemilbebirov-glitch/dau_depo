<!-- ===== COMPONENT: BOT CREATE FORM ===== -->
<div class="hud-form" id="botCreateForm" style="display:none;">
    <div class="form-row">
        <div class="form-group">
            <label class="hud-label">BOT ADI</label>
            <input type="text" id="botName" class="hud-input" placeholder="Məs: Qızıl Bot">
        </div>
        <div class="form-group">
            <label class="hud-label">SİMVOL</label>
            <select id="botSymbol" class="hud-select">
                <option value="XAUUSDm">XAUUSDm (Qızıl)</option>
                <option value="BTCUSDm">BTCUSDm (Bitcoin)</option>
                <option value="ETHUSDm">ETHUSDm (Ethereum)</option>
                <option value="EURUSDm">EURUSDm</option>
                <option value="GBPUSDm">GBPUSDm</option>
                <option value="USDJPYm">USDJPYm</option>
            </select>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label class="hud-label">REJİM</label>
            <select id="botMode" class="hud-select">
                <option value="autonomous">Aavtonom (Tam avtomatik)</option>
                <option value="semi_autonomous" selected>Yarımavtonom (Təsdiq lazımdır)</option>
                <option value="manual">Manual (Yalnız əl ilə)</option>
            </select>
        </div>
        <div class="form-group">
            <label class="hud-label">STRATEQİ</label>
            <select id="botStrategy" class="hud-select"></select>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label class="hud-label">TİMEFRAME</label>
            <select id="botTimeframe" class="hud-select">
                <option value="M1">M1</option>
                <option value="M5">M5</option>
                <option value="M15" selected>M15</option>
                <option value="M30">M30</option>
                <option value="H1">H1</option>
                <option value="H4">H4</option>
                <option value="D1">D1</option>
            </select>
        </div>
        <div class="form-group">
            <label class="hud-label">HƏCM (LOT)</label>
            <input type="number" id="botLotSize" class="hud-input" step="0.01" value="0.01">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label class="hud-label">STOP LOSS</label>
            <input type="number" id="botStopLoss" class="hud-input" step="0.01" value="0" placeholder="0 = deaktiv">
        </div>
        <div class="form-group">
            <label class="hud-label">TAKE PROFİT</label>
            <input type="number" id="botTakeProfit" class="hud-input" step="0.01" value="0" placeholder="0 = deaktiv">
        </div>
        <div class="form-group">
            <label class="hud-label">TRAİLİNG STOP</label>
            <input type="number" id="botTrailingStop" class="hud-input" step="0.01" value="0" placeholder="0 = deaktiv">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label class="hud-label">MAKS GÜNLÜK TİCARƏT</label>
            <input type="number" id="botMaxTrades" class="hud-input" value="5">
        </div>
        <div class="form-group">
            <label class="hud-label">MAKS GÜNLÜK İTİRMƏ ($)</label>
            <input type="number" id="botMaxLoss" class="hud-input" step="0.01" value="100">
        </div>
        <div class="form-group">
            <label class="hud-label">RİSK %</label>
            <input type="number" id="botRiskPerTrade" class="hud-input" step="0.1" value="2.0">
        </div>
    </div>
    <div class="form-actions">
        <button class="btn-hud btn-primary" onclick="BotManager.createBot()">BOT YARAT</button>
        <button class="btn-hud" onclick="toggleBotCreateForm()">LƏĞV ET</button>
    </div>
</div>
