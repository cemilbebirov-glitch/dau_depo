<!-- ====== TOP HUD BAR ====== -->
<header class="hud-top">
    <div class="hud-top-left">
        <div class="hud-logo">
            <span class="logo-text">DAU</span>
            <span class="logo-sub">JARVIS SYSTEM</span>
        </div>
        <div class="hud-status-badges">
            <span class="badge badge-online" id="statusBadge">
                <span class="badge-dot"></span>ONLİNE
            </span>
            <span class="badge badge-model" id="activeModelBadge">qwen3:8b</span>
        </div>
    </div>
    <div class="hud-top-center">
        <div class="hud-datetime">
            <span class="hud-date" id="hudDate">--</span>
            <span class="hud-time" id="hudTime">--:--:--</span>
        </div>
        <div class="hud-title-bar">
            <div class="hud-title-line"></div>
            <span class="hud-title">DAU İNTELLİGENT SİSTEM</span>
            <div class="hud-title-line"></div>
        </div>
    </div>
    <div class="hud-top-right">
        <div class="hud-metrics">
            <div class="hud-metric">
                <span class="metric-label">CPU</span>
                <span class="metric-value" id="hudCpu">--%</span>
            </div>
            <div class="hud-metric">
                <span class="metric-label">RAM</span>
                <span class="metric-value" id="hudRam">--%</span>
            </div>
            <div class="hud-metric">
                <span class="metric-label">TEMP</span>
                <span class="metric-value" id="hudTemp">--°C</span>
            </div>
        </div>
    </div>
</header>
