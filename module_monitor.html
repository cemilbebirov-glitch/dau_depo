<!-- ======= MODULE: MONITOR ======= -->
<section class="module-panel" id="module-monitor" style="display:none;">
    <div class="panel-header">
        <div class="panel-title-group">
            <div class="panel-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#ff0040" stroke-width="2"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h7v2H8v2h8v-2h-2v-2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
            </div>
            <h2 class="panel-title">SİSTEM MONİTORU</h2>
        </div>
    </div>
    <!-- Monitor Gauges -->
    <div class="monitor-gauges">
        <div class="gauge-card">
            <div class="gauge-ring" id="gaugeCpu">
                <svg viewBox="0 0 120 120">
                    <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(255,0,64,0.15)" stroke-width="8"/>
                    <circle cx="60" cy="60" r="54" fill="none" stroke="#ff0040" stroke-width="8" stroke-dasharray="339.29" stroke-dashoffset="339.29" stroke-linecap="round" transform="rotate(-90 60 60)" class="gauge-fill" id="gaugeCpuFill"/>
                    <text x="60" y="55" text-anchor="middle" fill="#ff0040" font-family="Orbitron" font-size="20" font-weight="700" id="gaugeCpuText">0%</text>
                    <text x="60" y="75" text-anchor="middle" fill="#ff3366" font-family="Share Tech Mono" font-size="9">CPU</text>
                </svg>
            </div>
        </div>
        <div class="gauge-card">
            <div class="gauge-ring" id="gaugeRam">
                <svg viewBox="0 0 120 120">
                    <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(255,0,64,0.15)" stroke-width="8"/>
                    <circle cx="60" cy="60" r="54" fill="none" stroke="#ff3366" stroke-width="8" stroke-dasharray="339.29" stroke-dashoffset="339.29" stroke-linecap="round" transform="rotate(-90 60 60)" class="gauge-fill" id="gaugeRamFill"/>
                    <text x="60" y="55" text-anchor="middle" fill="#ff3366" font-family="Orbitron" font-size="20" font-weight="700" id="gaugeRamText">0%</text>
                    <text x="60" y="75" text-anchor="middle" fill="#ff3366" font-family="Share Tech Mono" font-size="9">RAM</text>
                </svg>
            </div>
        </div>
        <div class="gauge-card">
            <div class="gauge-ring" id="gaugeDisk">
                <svg viewBox="0 0 120 120">
                    <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(255,0,64,0.15)" stroke-width="8"/>
                    <circle cx="60" cy="60" r="54" fill="none" stroke="#cc0033" stroke-width="8" stroke-dasharray="339.29" stroke-dashoffset="339.29" stroke-linecap="round" transform="rotate(-90 60 60)" class="gauge-fill" id="gaugeDiskFill"/>
                    <text x="60" y="55" text-anchor="middle" fill="#cc0033" font-family="Orbitron" font-size="20" font-weight="700" id="gaugeDiskText">0%</text>
                    <text x="60" y="75" text-anchor="middle" fill="#cc0033" font-family="Share Tech Mono" font-size="9">DISK</text>
                </svg>
            </div>
        </div>
        <div class="gauge-card">
            <div class="gauge-ring" id="gaugeGpu">
                <svg viewBox="0 0 120 120">
                    <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(255,0,64,0.15)" stroke-width="8"/>
                    <circle cx="60" cy="60" r="54" fill="none" stroke="#ff1a1a" stroke-width="8" stroke-dasharray="339.29" stroke-dashoffset="339.29" stroke-linecap="round" transform="rotate(-90 60 60)" class="gauge-fill" id="gaugeGpuFill"/>
                    <text x="60" y="55" text-anchor="middle" fill="#ff1a1a" font-family="Orbitron" font-size="20" font-weight="700" id="gaugeGpuText">0%</text>
                    <text x="60" y="75" text-anchor="middle" fill="#ff1a1a" font-family="Share Tech Mono" font-size="9">GPU</text>
                </svg>
            </div>
        </div>
    </div>
    <!-- Monitor Details -->
    <div class="monitor-details">
        <div class="monitor-detail-card">
            <h4 class="detail-title">SİSTEM MƏLUMATI</h4>
            <div class="detail-rows" id="monitorSystemInfo">
                <div class="hud-empty">Yüklənir...</div>
            </div>
        </div>
        <div class="monitor-detail-card">
            <h4 class="detail-title">PROSESLƏR</h4>
            <div class="data-table-container">
                <table class="hud-table hud-table-sm">
                    <thead><tr><th>AD</th><th>CPU</th><th>RAM</th><th>PİD</th></tr></thead>
                    <tbody id="monitorProcesses">
                        <tr><td colspan="4" class="hud-empty">Yüklənir...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>
