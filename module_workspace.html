<!-- ======= MODULE: WORKSPACE ======= -->
<section class="module-panel" id="module-workspace" style="display:none;">
    <div class="panel-header">
        <div class="panel-title-group">
            <div class="panel-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#ff0040" stroke-width="2"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
            </div>
            <h2 class="panel-title">KOD SAHƏSİ</h2>
        </div>
        <div class="panel-actions">
            <button class="btn-hud" onclick="workspaceNewFile()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                YENİ FAYL
            </button>
            <button class="btn-hud" onclick="workspaceRefresh()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.65 6.35A7.96 7.96 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                YENİLƏ
            </button>
        </div>
    </div>
    <!-- Workspace Split View -->
    <div class="workspace-split">
        <!-- File Tree -->
        <div class="workspace-tree">
            <div class="tree-header">FAYLLAR</div>
            <div class="tree-content" id="workspaceTree">
                <div class="hud-empty">Fayl yoxdur</div>
            </div>
        </div>
        <!-- Code Editor -->
        <div class="workspace-editor">
            <div class="editor-toolbar">
                <span class="editor-filename" id="editorFilename">fayl seçilməyib</span>
                <button class="btn-hud btn-sm" onclick="workspaceSaveFile()">YADDƏ SAXLA</button>
                <button class="btn-hud btn-sm" onclick="workspaceRunCode()">İŞLƏT</button>
            </div>
            <textarea class="code-editor" id="codeEditor" placeholder="Kodu bura yazın..." spellcheck="false"></textarea>
            <div class="editor-output" id="editorOutput" style="display:none;">
                <div class="output-header">NƏTİCƏ</div>
                <pre class="output-content" id="editorOutputContent"></pre>
            </div>
        </div>
    </div>
    <!-- AI Code Generator -->
    <div class="panel-subsection">
        <h3 class="subsection-title">AI KOD GENERATORU</h3>
        <div class="hud-search-bar">
            <input type="text" id="workspaceAIPrompt" class="hud-input" placeholder="Kod təsviri daxil edin..." onkeydown="if(event.key==='Enter')workspaceGenerateCode()">
            <button class="btn-hud btn-primary" onclick="workspaceGenerateCode()">GENERASIYA ET</button>
        </div>
    </div>
</section>
